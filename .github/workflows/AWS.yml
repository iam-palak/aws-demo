name: AWS CICD Pipeline

on:
  push:
    branches:
      - test2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code 
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: |
          docker build -t testapp:1 .

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}       
          aws-region: us-east-1

      - name: ECR Login
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin 523208255211.dkr.ecr.us-east-1.amazonaws.com
          
      - name: Create ECR Repository
        run: aws ecr create-repository --repository-name my-repo7 --region us-east-1

      - name: Tag Docker Image
        run: docker tag newapp:1 523208255211.dkr.ecr.us-east-1.amazonaws.com/my-repo7:${{ github.sha }}

      - name: Push Docker Image to ECR
        run: docker push 523208255211.dkr.ecr.us-east-1.amazonaws.com/my-repo7:${{ github.sha }}

