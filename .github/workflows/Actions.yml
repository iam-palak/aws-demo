name: CICD on AWS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  Setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up Java
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

  Build:
    runs-on: ubuntu-latest
    needs: Setup

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Build Docker Image
        run: docker build -t my-app:latest .

  Push-to-ECR:
    runs-on: ubuntu-latest
    needs: Build

    steps: 
      - name: AWS Login
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          default-region: us-east-1
          default-output: json
      - name: ECR Login
        run: aws ecr get-login-password --region us-east-1 | docker login --username iam-palak --password-stdin 523208255211.dkr.ecr.us-east-1.amazonaws.com

      - name: Create ECR Repository
        run: aws ecr create-repository --repository-name my-repo --region us-east-1

      - name: Tag Docker Image
        run: docker tag my-app:latest 523208255211.dkr.ecr.us-east-1.amazonaws.com/my-repo:${{ github.sha }}
      - name: Push Docker Image to ECR
        run: docker push 523208255211.dkr.ecr.us-east-1.amazonaws.com/my-repo:${{ github.sha }}


