name: AWS RDS

on:
  workflow_dispatch

jobs:
  db-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Install PostgreSQL Client
        run: sudo apt-get install postgresql-client -y

      - name: Connect to RDS and Create Database
        env:
          DB_HOST: database-1.cr84ewkki10x.us-east-2.rds.amazonaws.com
          DB_USER: psql
          DB_PASS: stockhome
        run: |
          PGPASSWORD=$DB_PASS psql -h $DB_HOST -U $DB_USER -d postgres -c "CREATE TABLE students (id SERIAL PRIMARY KEY, name VARCHAR(100), age INT);"

      - name: Validate Data
        run: |
          PGPASSWORD=$DB_PASS psql -h $DB_HOST -U $DB_USER -d postgres -c "SELECT * FROM students;"
